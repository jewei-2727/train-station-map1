<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台鐵火車站收藏地圖</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Space+Mono&display=swap');
:root{
  --bg:#f4f1ec;--surf:#fff;--surf2:#f0ece4;
  --bd:#ddd8cd;--tx:#2a2620;--mt:#857e74;
  --ac:#9a4e08;--ac2:#c46f1a;
  --vt:#7a4a2a;--vtl:#f2e8e0;
  --un:#3a6fa8;
  --sh:0 2px 8px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Space Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--surf);border-bottom:1.5px solid var(--bd);padding:10px 18px;display:flex;align-items:center;gap:16px;flex-shrink:0;box-shadow:var(--sh);z-index:900;}
.logo{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;color:var(--ac);letter-spacing:2px;white-space:nowrap;}
.logo small{display:block;font-family:'Space Mono',monospace;font-size:9px;font-weight:400;color:var(--mt);letter-spacing:3px;}
.pw{flex:1;max-width:180px;}
.pb{height:5px;background:var(--bd);border-radius:3px;overflow:hidden;margin-bottom:3px;}
.pf{height:100%;background:linear-gradient(90deg,var(--vt),var(--ac2));border-radius:3px;transition:width .5s;}
.pt{font-size:9px;color:var(--mt);letter-spacing:1px;}
.stats{display:flex;gap:14px;margin-left:auto;align-items:center;}
.stat{text-align:center;}
.sn{font-size:17px;font-weight:700;line-height:1;}
.sl{font-size:9px;color:var(--mt);letter-spacing:1px;margin-top:2px;}
.sv .sn{color:var(--vt);} .sto .sn{color:var(--ac);}
.legend{display:flex;gap:10px;align-items:center;padding:0 4px;}
.lg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--mt);}
.lg-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.8);box-shadow:0 1px 3px rgba(0,0,0,.2);}
.sync-btn{padding:5px 12px;font-size:9px;background:var(--surf2);border:1.5px solid var(--bd);border-radius:4px;color:var(--mt);cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s;white-space:nowrap;}
.sync-btn:hover{color:var(--ac);border-color:var(--ac);}
.sync-btn.saving{color:var(--ac);border-color:var(--ac);opacity:.7;pointer-events:none;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:272px;background:var(--surf);border-right:1.5px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.sbh{padding:12px 12px 9px;border-bottom:1px solid var(--bd);background:var(--surf2);}
.srch{width:100%;background:var(--surf);border:1.5px solid var(--bd);border-radius:6px;padding:7px 10px;color:var(--tx);font-family:'Space Mono',monospace;font-size:11px;outline:none;transition:border-color .2s;}
.srch::placeholder{color:var(--mt);} .srch:focus{border-color:var(--ac);}
.tabs{display:flex;gap:4px;margin-top:8px;}
.tab{flex:1;padding:5px 0;font-size:9px;background:var(--surf);border:1.5px solid var(--bd);border-radius:4px;color:var(--mt);cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s;text-align:center;}
.tab:hover{color:var(--tx);border-color:#aaa;}
.tab.on{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:700;}
.lct{font-size:9px;color:var(--mt);padding:5px 13px 2px;letter-spacing:1px;}
.list{flex:1;overflow-y:auto;padding:3px 0;}
.list::-webkit-scrollbar{width:3px;}
.list::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
.item{padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:9px;border-left:3px solid transparent;transition:background .1s;}
.item:hover{background:var(--surf2);} .item.on{background:#fff8f2;border-left-color:var(--ac);}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dv{background:var(--vt);}
.du{background:var(--un);opacity:.7;}
.iname{font-size:12px;font-family:'Noto Serif TC',serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.iename{font-size:9px;color:var(--mt);margin-top:1px;}
.idate{font-size:9px;color:var(--vt);margin-top:1px;}
.iphoto{font-size:9px;color:var(--ac);margin-top:1px;}
.icode{font-size:9px;color:#ccc5bb;flex-shrink:0;}
#map{flex:1;}
/* POPUP */
.leaflet-popup-content-wrapper{background:#fff!important;border:1.5px solid var(--bd)!important;border-radius:12px!important;box-shadow:0 8px 28px rgba(0,0,0,.13)!important;padding:0!important;}
.leaflet-popup-content{margin:0!important;font-family:'Space Mono',monospace!important;color:var(--tx)!important;min-width:260px;max-width:300px;}
.leaflet-popup-tip{background:#fff!important;box-shadow:none!important;}
.pu{padding:15px;}
.pu-name{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--ac);margin-bottom:1px;}
.pu-en{font-size:9px;color:var(--mt);letter-spacing:2px;margin-bottom:11px;}
.pu-meta{font-size:10px;color:var(--mt);line-height:1.9;padding:9px 10px;background:var(--surf2);border-radius:6px;margin-bottom:12px;}
.pu-meta b{color:var(--tx);}
.pu-acts{display:flex;gap:8px;margin-bottom:10px;}
.btn{flex:1;padding:9px 4px;font-size:11px;border:1.5px solid var(--bd);border-radius:5px;background:var(--surf2);color:var(--mt);cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s;text-align:center;}
.btn:hover{color:var(--tx);border-color:#999;}
.bv{background:var(--vtl);color:var(--vt);border-color:var(--vt);font-weight:700;}
.date-sec{border-top:1px solid var(--bd);padding-top:10px;margin-bottom:10px;}
.dlbl{font-size:9px;color:var(--mt);letter-spacing:1px;margin-bottom:6px;}
.drow{display:flex;gap:6px;align-items:center;}
.dinput{flex:1;background:var(--surf2);border:1.5px solid var(--bd);border-radius:5px;padding:6px 8px;color:var(--tx);font-family:'Space Mono',monospace;font-size:11px;outline:none;transition:border-color .2s;}
.dinput:focus{border-color:var(--ac);}
.dsave{padding:6px 12px;font-size:10px;background:var(--ac);color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:'Space Mono',monospace;transition:background .15s;white-space:nowrap;}
.dsave:hover{background:var(--ac2);}
.dhint{font-size:9px;color:var(--mt);margin-top:5px;}
/* PHOTO */
.photo-sec{border-top:1px solid var(--bd);padding-top:10px;}
.photo-lbl{font-size:9px;color:var(--mt);letter-spacing:1px;margin-bottom:8px;}
.photo-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.photo-thumb{position:relative;width:75px;height:75px;border-radius:6px;overflow:hidden;border:1.5px solid var(--bd);cursor:pointer;flex-shrink:0;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-del{position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.photo-del:hover{background:rgba(180,30,20,.85);}
.upload-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 12px;font-size:10px;background:var(--surf2);border:1.5px dashed var(--bd);border-radius:6px;color:var(--mt);cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s;width:100%;}
.upload-btn:hover{border-color:var(--ac);color:var(--ac);}
.upload-btn input{display:none;}
.uploading{opacity:.6;pointer-events:none;}
/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;align-items:center;justify-content:center;flex-direction:column;}
.lightbox.show{display:flex;}
.lightbox img{max-width:92vw;max-height:86vh;border-radius:8px;object-fit:contain;}
.lb-close{margin-top:14px;padding:7px 22px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:20px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;}
.lb-close:hover{background:rgba(255,255,255,.25);}
/* LOADING */
.loading{position:fixed;inset:0;background:rgba(244,241,236,.9);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:9998;font-size:13px;color:var(--mt);letter-spacing:2px;}
.loading.hide{display:none;}
.spinner{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* Leaflet */
.leaflet-control-zoom a{background:#fff!important;color:var(--tx)!important;border-color:var(--bd)!important;}
.leaflet-control-zoom a:hover{background:var(--surf2)!important;color:var(--ac)!important;}
.leaflet-bar{border-color:var(--bd)!important;box-shadow:var(--sh)!important;}
.leaflet-control-attribution{font-size:9px!important;background:rgba(255,255,255,.75)!important;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#fff;border:1.5px solid var(--ac);color:var(--ac);padding:8px 18px;font-size:11px;border-radius:6px;letter-spacing:1px;transition:transform .3s;z-index:9997;pointer-events:none;white-space:nowrap;box-shadow:var(--sh);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── 手機版 ── */
.menu-btn{display:none;padding:5px 10px;font-size:16px;background:var(--surf2);border:1.5px solid var(--bd);border-radius:4px;color:var(--tx);cursor:pointer;line-height:1;flex-shrink:0;}
@media(max-width:640px){
  header{padding:8px 10px;gap:8px;flex-wrap:wrap;}
  .logo small{display:none;}
  .logo{font-size:14px;}
  .legend{display:none;}
  .pw{max-width:120px;}
  .sync-btn{font-size:8px;padding:4px 8px;}
  .menu-btn{display:flex;align-items:center;justify-content:center;}
  .sidebar{
    position:fixed;left:0;top:0;bottom:0;z-index:800;
    transform:translateX(-100%);transition:transform .3s ease;
    box-shadow:4px 0 16px rgba(0,0,0,.15);
  }
  .sidebar.open{transform:translateX(0);}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:799;}
  .overlay.show{display:block;}
}
</style>
</head>

<div class="loading" id="loading">

</div>

</div>

</div>

<div class="toast" id="toast"></div>

const LOCAL_KEY = 'tra_v8';

let state = {}, filter = 'all', query = '', markers = {}, activeEl = null, map;

// ── 讀取 ─────────────────────────────────────
async function loadFromSheet() {
  try {
    const res = await fetch(SCRIPT_URL);
    if (!res.ok) throw new Error();
    state = await res.json();
    localStorage.setItem(LOCAL_KEY, JSON.stringify(state));
  } catch(e) {
    const local = localStorage.getItem(LOCAL_KEY);
    if (local) { state = JSON.parse(local); toast('⚠ 離線模式，顯示本機資料'); }
  }
  document.getElementById('loading').classList.add('hide');
  updateStats(); renderList();
  Object.keys(markers).forEach(refreshMarker);
}

// ── 儲存打卡資料 ──────────────────────────────
async function syncToSheet() {
  const btn = document.getElementById('syncBtn');
  btn.textContent = '☁ 儲存中...'; btn.classList.add('saving');
  try {
    // 只傳打卡資料（不包含 photos，照片是即時上傳的）
    const toSave = {};
    Object.entries(state).forEach(([k,v]) => {
      toSave[k] = {status: v.status, date: v.date};
    });
    const res = await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify(toSave)
    });
    if (!res.ok) throw new Error();
    localStorage.setItem(LOCAL_KEY, JSON.stringify(state));
    toast('✓ 已儲存到雲端');
  } catch(e) {
    toast('✕ 儲存失敗，請稍後再試');
  }
  btn.textContent = '☁ 儲存'; btn.classList.remove('saving');
}

// ── 上傳照片 ──────────────────────────────────
async function uploadPhoto(code, input) {
  const files = Array.from(input.files);
  if (!files.length) return;

  const label = input.closest('.upload-btn');
  label.classList.add('uploading');
  label.childNodes.forEach(n => { if(n.nodeType===3) n.textContent=' 上傳中...'; });

  for (const file of files) {
    try {
      // 壓縮到最大 800px
      const compressed = await compressImage(file);
      const base64 = compressed.split(',')[1];
      const mimeType = 'image/jpeg';
      const filename = `${code}_${Date.now()}.jpg`;

      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: {'Content-Type': 'text/plain'},
        body: JSON.stringify({action:'uploadPhoto', code, filename, base64, mimeType})
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);

      // 更新本地 state
      if (!state[code]) state[code] = {status:'visited', date: new Date().toISOString().slice(0,10), photos:[]};
      if (!state[code].photos) state[code].photos = [];
      state[code].photos.push(data.url);
      localStorage.setItem(LOCAL_KEY, JSON.stringify(state));
      toast('✓ 照片上傳成功');
    } catch(e) {
      toast('✕ 照片上傳失敗：' + e.message);
    }
  }

  refreshMarker(code); renderList();
  // 重新開啟 popup
  const s = STATIONS.find(x => x.code===code);
  const m = markers[code];
  if (s && m) { map.closePopup(); setTimeout(() => openPopup(s, m), 80); }
}

// ── 刪除照片 ──────────────────────────────────
async function deletePhoto(code, url) {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({action:'deletePhoto', code, url})
    });
    const data = await res.json();
    if (!data.ok) throw new Error();

    if (state[code] && state[code].photos) {
      state[code].photos = state[code].photos.filter(p => p !== url);
    }
    localStorage.setItem(LOCAL_KEY, JSON.stringify(state));
    refreshMarker(code); renderList();
    const s = STATIONS.find(x => x.code===code);
    const m = markers[code];
    if (s && m) { map.closePopup(); setTimeout(() => openPopup(s, m), 80); }
    toast('✓ 照片已刪除');
  } catch(e) {
    toast('✕ 刪除失敗');
  }
}

// ── 壓縮圖片 ──────────────────────────────────
function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const max = 800;
        let w = img.width, h = img.height;
        if (w > max) { h = Math.round(h * max / w); w = max; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.78));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── MAP ──────────────────────────────────────
function initMap() {
  map = L.map('map', {center:[23.7,121.0], zoom:7});
  L.tileLayer(
    'https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}',
    {attribution:'© 國土測繪中心 NLSC', maxZoom:20, tileSize:256}
  ).addTo(map);
  STATIONS.forEach(s => {
    const c = parseGps(s.gps); if (!c) return;
    const m = L.marker([c.lat, c.lng], {icon: mkIcon(s.code)}).addTo(map);
    m.on('click', () => openPopup(s, m));
    markers[s.code] = m;
  });
}

function parseGps(g) {
  if (!g) return null;
  const p = g.trim().split(/\s+/);
  return p.length < 2 ? null : {lat:+p[0], lng:+p[1]};
}

function mkIcon(code) {
  const r = state[code];
  const visited = r && r.status === 'visited';
  const hasPhoto = visited && r.photos && r.photos.length > 0;
  const c = visited ? '#7a4a2a' : '#3a6fa8';
  const ring = hasPhoto
    ? `border:2px solid #c46f1a;box-shadow:0 0 0 2px rgba(196,111,26,.35),0 1px 4px rgba(0,0,0,.3);`
    : `border:2px solid rgba(255,255,255,.85);box-shadow:0 1px 4px rgba(0,0,0,.3);`;
  return L.divIcon({
    className:'',
    html:`<div style="width:11px;height:11px;border-radius:50%;background:${c};${ring}"></div>`,
    iconSize:[11,11], iconAnchor:[5,5]
  });
}

function refreshMarker(code) {
  const m = markers[code]; if (m) m.setIcon(mkIcon(code));
}

// ── POPUP ────────────────────────────────────
function openPopup(s, m) {
  const r = state[s.code], status = r ? r.status : null, date = r ? r.date||'' : '';
  const vOn = status === 'visited';
  const today = new Date().toISOString().slice(0,10);
  const photos = (r && r.photos) ? r.photos : [];

  const thumbs = photos.map((url, i) => `
    <div class="photo-thumb" onclick="event.stopPropagation();openLightbox('${url}')">
      <img src="${url}" alt="照片${i+1}" loading="lazy">
      <button class="photo-del" onclick="event.stopPropagation();deletePhoto('${s.code}','${url}')" title="刪除">✕</button>
    </div>`).join('');

  const html = `<div class="pu">
  <div class="pu-name">${s.name}</div>
  <div class="pu-en">${s.ename}</div>
  <div class="pu-meta">
    <b>站碼</b> ${s.code}<br>
    <b>地址</b> ${s.addr||'—'}<br>
    ${s.tel ? `<b>電話</b> ${s.tel}<br>` : ''}
    <b>Youbike</b> ${s.bike==='Y' ? '✓ 有' : '✗ 無'}
  </div>
  <div class="pu-acts">
    <div class="btn ${vOn?'bv':''}" onclick="setStatus('${s.code}','visited')">✓ 已打卡</div>
    <div class="btn" onclick="setStatus('${s.code}',null)">✕ 取消</div>
  </div>
  ${vOn ? `<div class="date-sec">
    <div class="dlbl">打卡日期（可修改）</div>
    <div class="drow">
      <input class="dinput" type="date" id="di_${s.code}" value="${date}" max="${today}">
      <button class="dsave" onclick="saveDate('${s.code}')">儲存</button>
    </div>
    <div class="dhint">修改後記得按右上角「☁ 儲存」</div>
  </div>` : ''}
  <div class="photo-sec">
    <div class="photo-lbl">📷 到站照片（${photos.length} 張）</div>
    ${photos.length > 0 ? `<div class="photo-grid">${thumbs}</div>` : ''}
    <label class="upload-btn">
      <input type="file" accept="image/*" multiple onchange="uploadPhoto('${s.code}',this)">
      ＋ 上傳照片到 Google Drive
    </label>
  </div>
</div>`;
  m.bindPopup(html, {maxWidth:300, className:''}).openPopup();
  hlItem(s.code);
}

function setStatus(code, status) {
  const today = new Date().toISOString().slice(0,10);
  if (!status) {
    delete state[code];
  } else {
    const old = state[code] || {};
    state[code] = {status, date: old.status==='visited' ? old.date : today, photos: old.photos||[]};
  }
  refreshMarker(code); updateStats(); renderList();
  map.closePopup();
  const s = STATIONS.find(x => x.code===code);
  const m = markers[code];
  if (s && m) setTimeout(() => openPopup(s, m), 80);
}

function saveDate(code) {
  const inp = document.getElementById('di_'+code);
  if (!inp) return;
  if (state[code]) state[code].date = inp.value;
  renderList();
  toast('✓ 日期已更新，記得按「☁ 儲存」');
}

// ── 燈箱 ─────────────────────────────────────
function openLightbox(url) {
  document.getElementById('lbImg').src = url;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}

// ── STATS & LIST ─────────────────────────────
function updateStats() {
  let v = 0;
  Object.values(state).forEach(r => { if (r.status==='visited') v++; });
  document.getElementById('sv').textContent = v;
  document.getElementById('pf').style.width = (v/244*100).toFixed(1)+'%';
  document.getElementById('pt').textContent = v+' / 244 已打卡';
}

function filteredList() {
  return STATIONS.filter(s => {
    const r = state[s.code], status = r ? r.status : 'unvisited';
    if (filter==='visited' && status!=='visited') return false;
    if (filter==='unvisited' && status!=='unvisited') return false;
    if (query) {
      const q = query.toLowerCase();
      return s.name.includes(q) || s.ename.toLowerCase().includes(q) || s.code.includes(q);
    }
    return true;
  });
}

function renderList() {
  const data = filteredList();
  document.getElementById('lct').textContent = '顯示 '+data.length+' 站';
  document.getElementById('list').innerHTML = data.map(s => {
    const r = state[s.code], status = r ? r.status : 'unvisited';
    const dc = status==='visited' ? 'dv' : 'du';
    const dateStr = r && r.date ? `<div class="idate">📅 ${r.date}</div>` : '';
    const pc = r && r.photos ? r.photos.length : 0;
    const photoStr = pc > 0 ? `<div class="iphoto">📷 ${pc} 張</div>` : '';
    return `<div class="item" id="i_${s.code}" onclick="focusStation('${s.code}')">
      <div class="dot ${dc}"></div>
      <div style="flex:1;min-width:0;">
        <div class="iname">${s.name}</div>
        <div class="iename">${s.ename}</div>
        ${dateStr}${photoStr}
      </div>
      <div class="icode">${s.code}</div>
    </div>`;
  }).join('');
}

function focusStation(code) {
  const s = STATIONS.find(x => x.code===code); if (!s) return;
  const c = parseGps(s.gps); if (!c) return;
  map.setView([c.lat, c.lng], 14, {animate:true});
  const m = markers[code];
  if (m) setTimeout(() => openPopup(s, m), 350);
  hlItem(code);
}

function hlItem(code) {
  if (activeEl) activeEl.classList.remove('on');
  const el = document.getElementById('i_'+code);
  if (el) { el.classList.add('on'); el.scrollIntoView({behavior:'smooth',block:'nearest'}); activeEl=el; }
}

function setTab(f, el) {
  filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  renderList();
}

function doFilter() { query = document.getElementById('srch').value; renderList(); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}


function toggleSidebar(){
  const sb=document.querySelector('.sidebar');
  const ov=document.getElementById('overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
}
function closeSidebar(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

window.addEventListener('load', () => {
  initMap();
  loadFromSheet();
});
</script>
