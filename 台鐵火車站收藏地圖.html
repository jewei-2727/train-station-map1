<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台鐵火車站收藏地圖</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0f0f0e;
    --surface: #1a1a18;
    --surface2: #252522;
    --border: #2e2e2a;
    --text: #e8e6df;
    --muted: #888880;
    --accent: #d4a843;
    --accent2: #e8c96a;
    --visited: #4caf7d;
    --unvisited: #5b8fd4;
    --target: #e06b4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 1000;
  }

  .logo {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .logo span {
    font-size: 11px;
    color: var(--muted);
    display: block;
    letter-spacing: 3px;
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    margin-top: 1px;
  }

  .stats-bar {
    display: flex;
    gap: 20px;
    margin-left: auto;
    align-items: center;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .stat.visited .stat-num { color: var(--visited); }
  .stat.target .stat-num { color: var(--target); }
  .stat.total .stat-num { color: var(--accent); }

  .progress-wrap {
    flex: 1;
    max-width: 200px;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--visited), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .progress-text {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .search-box {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box::placeholder { color: var(--muted); }
  .search-box:focus { border-color: var(--accent); }

  .filter-tabs {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }

  .tab {
    flex: 1;
    padding: 5px 0;
    font-size: 9px;
    letter-spacing: 1px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    transition: all 0.2s;
    text-align: center;
  }

  .tab:hover { color: var(--text); border-color: var(--muted); }
  .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }

  /* Station list */
  .station-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }

  .station-list::-webkit-scrollbar { width: 4px; }
  .station-list::-webkit-scrollbar-track { background: transparent; }
  .station-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .station-item {
    padding: 9px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid transparent;
    transition: background 0.1s;
    position: relative;
  }

  .station-item:hover { background: var(--surface2); }
  .station-item.active { background: var(--surface2); border-left: 2px solid var(--accent); }

  .station-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-visited { background: var(--visited); }
  .dot-unvisited { background: var(--border); border: 1.5px solid var(--muted); }
  .dot-target { background: var(--target); }

  .station-info { flex: 1; min-width: 0; }

  .station-name {
    font-size: 12px;
    font-family: 'Noto Serif TC', serif;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .station-ename {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-top: 1px;
  }

  .station-code {
    font-size: 9px;
    color: var(--border);
    font-family: 'Space Mono', monospace;
  }

  /* Map */
  #map {
    flex: 1;
    background: #1a1a18;
  }

  /* Popup */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    border-radius: 6px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    padding: 0 !important;
  }

  .leaflet-popup-content {
    margin: 0 !important;
    font-family: 'Space Mono', monospace !important;
    color: var(--text) !important;
    min-width: 220px;
  }

  .leaflet-popup-tip { background: var(--surface) !important; }

  .popup-inner {
    padding: 14px;
  }

  .popup-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 2px;
  }

  .popup-ename {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .popup-meta {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 12px;
  }

  .popup-meta b { color: var(--text); }

  .popup-actions {
    display: flex;
    gap: 6px;
  }

  .btn {
    flex: 1;
    padding: 7px 6px;
    font-size: 9px;
    letter-spacing: 1px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    transition: all 0.2s;
    text-align: center;
  }

  .btn:hover { color: var(--text); border-color: var(--muted); }
  .btn.btn-visited { background: var(--visited); color: #fff; border-color: var(--visited); font-weight: 700; }
  .btn.btn-target { background: var(--target); color: #fff; border-color: var(--target); font-weight: 700; }
  .btn.btn-clear { opacity: 0.6; }
  .btn.btn-clear:hover { opacity: 1; background: #333; }

  .popup-date {
    font-size: 9px;
    color: var(--accent2);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 8px 18px;
    font-size: 11px;
    border-radius: 4px;
    letter-spacing: 1px;
    transition: transform 0.3s ease;
    z-index: 9999;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Leaflet dark overrides */
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }

  .leaflet-control-zoom a:hover {
    background: var(--surface2) !important;
    color: var(--accent) !important;
  }

  .leaflet-bar { border-color: var(--border) !important; }

  .list-count {
    font-size: 9px;
    color: var(--muted);
    padding: 4px 14px 2px;
    letter-spacing: 1px;
  }
</style>
</head>

// ── 工具函式 ──────────────────────────────────────────
const STORAGE_KEY = 'tra_collection_v2';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// 解析 GPS 字串 → {lat, lng}
function parseGps(gps) {
  if (!gps) return null;
  const parts = gps.trim().split(/\s+/);
  if (parts.length < 2) return null;
  return { lat: parseFloat(parts[0]), lng: parseFloat(parts[1]) };
}

// ── 狀態 ──────────────────────────────────────────────
let state = loadState();   // { stationCode: { status: 'visited'|'target', date: '2025-01-01' } }
let currentFilter = 'all';
let searchQuery = '';
let activeMarkers = {};
let activeListItem = null;
let map;

// ── 建立地圖 ──────────────────────────────────────────
function initMap() {
  map = L.map('map', { center: [23.7, 121.0], zoom: 7, zoomControl: true });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    maxZoom: 18
  }).addTo(map);

  STATIONS_RAW.forEach(s => {
    const coords = parseGps(s.gps);
    if (!coords) return;

    const marker = createMarker(s, coords);
    activeMarkers[s.stationCode] = marker;
  });
}

function getMarkerColor(code) {
  const st = state[code];
  if (!st) return '#5b8fd4';
  if (st.status === 'visited') return '#4caf7d';
  if (st.status === 'target') return '#e06b4a';
  return '#5b8fd4';
}

function createMarkerIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width:10px;height:10px;border-radius:50%;
      background:${color};border:2px solid rgba(255,255,255,0.5);
      box-shadow:0 0 6px ${color}99;
      transition:all 0.3s;
    "></div>`,
    iconSize: [10, 10],
    iconAnchor: [5, 5]
  });
}

function createMarker(s, coords) {
  const color = getMarkerColor(s.stationCode);
  const marker = L.marker([coords.lat, coords.lng], {
    icon: createMarkerIcon(color)
  }).addTo(map);

  marker.on('click', () => openPopup(s, marker));
  return marker;
}

function updateMarker(code) {
  const marker = activeMarkers[code];
  if (!marker) return;
  const color = getMarkerColor(code);
  marker.setIcon(createMarkerIcon(color));
}

// ── Popup ──────────────────────────────────────────────
function openPopup(s, marker) {
  const st = state[s.stationCode];
  const status = st ? st.status : null;
  const date = st ? st.date : null;

  const html = `
    <div class="popup-inner">
      <div class="popup-name">${s.stationName}</div>
      <div class="popup-ename">${s.stationEName}</div>
      <div class="popup-meta">
        <b>站碼</b> ${s.stationCode}<br>
        <b>地址</b> ${s.stationAddrTw || '—'}<br>
        ${s.stationTel ? `<b>電話</b> ${s.stationTel}<br>` : ''}
        <b>Youbike</b> ${s.haveBike === 'Y' ? '✓ 有' : '✗ 無'}
      </div>
      <div class="popup-actions">
        <div class="btn ${status === 'visited' ? 'btn-visited' : ''}" onclick="setStatus('${s.stationCode}', 'visited')">✓ 已打卡</div>
        <div class="btn ${status === 'target' ? 'btn-target' : ''}" onclick="setStatus('${s.stationCode}', 'target')">★ 目標站</div>
        <div class="btn btn-clear" onclick="setStatus('${s.stationCode}', null)">✕</div>
      </div>
      ${date ? `<div class="popup-date">打卡日期：${date}</div>` : ''}
    </div>
  `;

  marker.bindPopup(html, { maxWidth: 260, className: '' }).openPopup();
  highlightListItem(s.stationCode);
}

// ── 設定狀態 ──────────────────────────────────────────
function setStatus(code, status) {
  if (status === null) {
    delete state[code];
  } else {
    const today = new Date().toISOString().slice(0, 10);
    const existing = state[code] || {};
    state[code] = {
      status,
      date: status === 'visited' ? (existing.status === 'visited' ? existing.date : today) : existing.date
    };
  }
  saveState(state);
  updateMarker(code);
  updateStats();
  renderList();
  map.closePopup();

  const s = STATIONS_RAW.find(x => x.stationCode === code);
  if (s) {
    const coords = parseGps(s.gps);
    if (coords) {
      const marker = activeMarkers[code];
      if (marker) {
        setTimeout(() => openPopup(s, marker), 100);
      }
    }
  }
}

// ── 統計 ──────────────────────────────────────────────
function updateStats() {
  let visited = 0, target = 0;
  Object.values(state).forEach(v => {
    if (v.status === 'visited') visited++;
    else if (v.status === 'target') target++;
  });
  const total = STATIONS_RAW.length;
  document.getElementById('statVisited').textContent = visited;
  document.getElementById('statTarget').textContent = target;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('progressFill').style.width = (visited / total * 100).toFixed(1) + '%';
  document.getElementById('progressText').textContent = `${visited} / ${total} 已打卡`;
}

// ── 列表 ──────────────────────────────────────────────
function getFilteredStations() {
  return STATIONS_RAW.filter(s => {
    const st = state[s.stationCode];
    const status = st ? st.status : 'unvisited';

    if (currentFilter === 'visited' && status !== 'visited') return false;
    if (currentFilter === 'target' && status !== 'target') return false;
    if (currentFilter === 'unvisited' && status !== 'unvisited') return false;

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return s.stationName.includes(q) || s.stationEName.toLowerCase().includes(q) || s.stationCode.includes(q);
    }
    return true;
  });
}

function renderList() {
  const filtered = getFilteredStations();
  const list = document.getElementById('stationList');
  const count = document.getElementById('listCount');

  count.textContent = `顯示 ${filtered.length} 站`;

  list.innerHTML = filtered.map(s => {
    const st = state[s.stationCode];
    const status = st ? st.status : 'unvisited';
    const dotClass = status === 'visited' ? 'dot-visited' : status === 'target' ? 'dot-target' : 'dot-unvisited';

    return `
      <div class="station-item" id="item-${s.stationCode}" onclick="focusStation('${s.stationCode}')">
        <div class="station-dot ${dotClass}"></div>
        <div class="station-info">
          <div class="station-name">${s.stationName}</div>
          <div class="station-ename">${s.stationEName}</div>
        </div>
        <div class="station-code">${s.stationCode}</div>
      </div>
    `;
  }).join('');
}

function focusStation(code) {
  const s = STATIONS_RAW.find(x => x.stationCode === code);
  if (!s) return;
  const coords = parseGps(s.gps);
  if (!coords) return;

  map.setView([coords.lat, coords.lng], 14, { animate: true });
  const marker = activeMarkers[code];
  if (marker) setTimeout(() => openPopup(s, marker), 300);
  highlightListItem(code);
}

function highlightListItem(code) {
  if (activeListItem) activeListItem.classList.remove('active');
  const el = document.getElementById(`item-${code}`);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    activeListItem = el;
  }
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function filterStations() {
  searchQuery = document.getElementById('searchInput').value;
  renderList();
}

// ── 初始化 ────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  updateStats();
  renderList();
});
</script>
</body>
</html>
